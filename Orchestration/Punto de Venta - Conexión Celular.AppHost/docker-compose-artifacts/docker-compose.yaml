services:
  aspire-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  scalar:
    image: "scalarapi/aspire-api-reference:0.11.11"
    environment:
      API_REFERENCE_CONFIG: ""
      CDN_URL: "scalar.js"
      ALLOW_SELF_SIGNED_CERTIFICATES: "true"
      FORWARD_ORIGINAL_HOST_HEADER: "false"
      DEFAULT_PROXY: "true"
      AUTH_GRPC: "http://auth:5015"
      services__auth__grpc__0: "http://auth:5015"
      AUTH_HTTP: "http://auth:5014"
      services__auth__http__0: "http://auth:5014"
      AUTH_HTTPS: "https://auth:5015"
      INVENTORY_GRPC: "http://inventory:5017"
      services__inventory__grpc__0: "http://inventory:5017"
      INVENTORY_HTTP: "http://inventory:5016"
      services__inventory__http__0: "http://inventory:5016"
      INVENTORY_HTTPS: "https://inventory:5017"
    expose:
      - "8080"
    depends_on:
      auth:
        condition: "service_started"
      inventory:
        condition: "service_started"
    networks:
      - "aspire"
  sql-server:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    expose:
      - "1433"
    volumes:
      - type: "volume"
        target: "/var/opt/mssql"
        source: "punto_de_venta_-_conexi_n_celular.apphost-7e590b22d3-sql-server-data"
        read_only: false
    networks:
      - "aspire"
  auth-service:
    image: "${AUTH_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Kestrel__Endpoints__grpc__Url: "http://*:5015"
      Kestrel__Endpoints__http__Url: "http://*:5014"
      ConnectionStrings__auth-database: "Server=sql-server,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=auth_database"
      AUTH_DATABASE_HOST: "sql-server"
      AUTH_DATABASE_PORT: "1433"
      AUTH_DATABASE_USERNAME: "sa"
      AUTH_DATABASE_PASSWORD: "${SQL_PASSWORD}"
      AUTH_DATABASE_URI: "mssql://sa:${SQL_PASSWORD}@sql-server:1433/auth_database"
      AUTH_DATABASE_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql-server:1433;databaseName=auth_database;trustServerCertificate=true"
      AUTH_DATABASE_DATABASENAME: "auth_database"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "auth"
    expose:
      - "5015"
      - "5014"
    volumes:
      - type: "bind"
        target: "/app/logs"
        source: "./logs"
        read_only: false
    depends_on:
      sql-server:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "on-failure:5"
  auth-service-migration:
    image: "${AUTH_SERVICE_MIGRATION_IMAGE}"
    environment:
      ConnectionStrings__auth-database: "Server=sql-server,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=auth_database"
      AUTH_DATABASE_HOST: "sql-server"
      AUTH_DATABASE_PORT: "1433"
      AUTH_DATABASE_USERNAME: "sa"
      AUTH_DATABASE_PASSWORD: "${SQL_PASSWORD}"
      AUTH_DATABASE_URI: "mssql://sa:${SQL_PASSWORD}@sql-server:1433/auth_database"
      AUTH_DATABASE_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql-server:1433;databaseName=auth_database;trustServerCertificate=true"
      AUTH_DATABASE_DATABASENAME: "auth_database"
    depends_on:
      sql-server:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "on-failure:5"
  inventory-service:
    image: "${INVENTORY_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Kestrel__Endpoints__grpc__Url: "http://*:5017"
      Kestrel__Endpoints__http__Url: "http://*:5016"
      ConnectionStrings__inventory-database: "Server=sql-server,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=inventory_database"
      INVENTORY_DATABASE_HOST: "sql-server"
      INVENTORY_DATABASE_PORT: "1433"
      INVENTORY_DATABASE_USERNAME: "sa"
      INVENTORY_DATABASE_PASSWORD: "${SQL_PASSWORD}"
      INVENTORY_DATABASE_URI: "mssql://sa:${SQL_PASSWORD}@sql-server:1433/inventory_database"
      INVENTORY_DATABASE_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql-server:1433;databaseName=inventory_database;trustServerCertificate=true"
      INVENTORY_DATABASE_DATABASENAME: "inventory_database"
      AUTH_GRPC: "http://auth:5015"
      services__auth__grpc__0: "http://auth:5015"
      AUTH_HTTP: "http://auth:5014"
      services__auth__http__0: "http://auth:5014"
      AUTH_HTTPS: "https://auth:5015"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "inventory"
    expose:
      - "5017"
      - "5016"
    volumes:
      - type: "bind"
        target: "/app/logs"
        source: "./logs"
        read_only: false
    depends_on:
      sql-server:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "on-failure:5"
  inventory-service-migration:
    image: "${INVENTORY_SERVICE_MIGRATION_IMAGE}"
    environment:
      ConnectionStrings__inventory-database: "Server=sql-server,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=inventory_database"
      INVENTORY_DATABASE_HOST: "sql-server"
      INVENTORY_DATABASE_PORT: "1433"
      INVENTORY_DATABASE_USERNAME: "sa"
      INVENTORY_DATABASE_PASSWORD: "${SQL_PASSWORD}"
      INVENTORY_DATABASE_URI: "mssql://sa:${SQL_PASSWORD}@sql-server:1433/inventory_database"
      INVENTORY_DATABASE_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql-server:1433;databaseName=inventory_database;trustServerCertificate=true"
      INVENTORY_DATABASE_DATABASENAME: "inventory_database"
    depends_on:
      sql-server:
        condition: "service_started"
    networks:
      - "aspire"
    restart: "on-failure:5"
networks:
  aspire:
    driver: "bridge"
volumes:
  punto_de_venta_-_conexi_n_celular.apphost-7e590b22d3-sql-server-data:
    driver: "local"
