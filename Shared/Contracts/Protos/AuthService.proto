syntax = "proto3";

option csharp_namespace = "AuthService.Protos";

message UserRequest {
  string user_id = 1;
  bool include_inactive_users = 2; 
};

message UserInfo {
  string given_name = 1;
  string last_name = 2;
  bool is_active = 3;
}

service AuthService {
  rpc GetUserInfo(UserRequest) returns (UserInfo);
}